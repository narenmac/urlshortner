apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: frontend
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
---
# ExternalName service to route /api traffic to gateway in backend namespace
apiVersion: v1
kind: Service
metadata:
  name: gateway-proxy
  namespace: frontend
spec:
  type: ExternalName
  externalName: gateway-service.backend.svc.cluster.local
  ports:
    - port: 8080
