name: CD

on:
  push:
    branches: [main]

env:
  IMAGE_PREFIX: ${{ secrets.DOCKERHUB_USERNAME }}/url-shortener

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - service: gateway
            context: ./backend
            dockerfile: ./backend/gateway/Dockerfile
          - service: url-service
            context: ./backend
            dockerfile: ./backend/url-service/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v4
        with:
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}

      - name: Create Namespaces
        run: |
          kubectl apply -f k8s/namespaces.yaml

      - name: Create/Update Secrets
        run: |
          kubectl create secret generic azure-storage \
            --from-literal=connection-string="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
            --namespace=backend \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create/Update ConfigMap
        run: |
          kubectl create configmap app-config \
            --from-literal=base-url="https://ourdomain" \
            --namespace=backend \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy
        run: |
          cd k8s
          sed -i "s|IMAGE_TAG|${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}|g" frontend/deployment.yaml
          sed -i "s|IMAGE_TAG|${{ env.IMAGE_PREFIX }}-gateway:${{ github.sha }}|g" gateway/deployment.yaml
          sed -i "s|IMAGE_TAG|${{ env.IMAGE_PREFIX }}-url-service:${{ github.sha }}|g" url-service/deployment.yaml
          kubectl apply -f frontend/
          kubectl apply -f gateway/
          kubectl apply -f url-service/

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/url-service -n backend --timeout=120s
          kubectl rollout status deployment/gateway -n backend --timeout=120s
          kubectl rollout status deployment/frontend -n frontend --timeout=120s

      - name: Smoke Test
        run: |
          INGRESS_IP=$(kubectl get ingress -n frontend -o jsonpath='{.items[0].status.loadBalancer.ingress[0].ip}')
          if [ -z "$INGRESS_IP" ]; then
            echo "⚠️ No Ingress IP assigned yet (NGINX Ingress Controller may not be installed)"
            echo "Skipping smoke test. Run: helm install nginx-ingress ingress-nginx/ingress-nginx"
            exit 0
          fi
          curl -f --max-time 10 "http://${INGRESS_IP}/api/health" || echo "⚠️ Health check failed (app may still be starting)"
